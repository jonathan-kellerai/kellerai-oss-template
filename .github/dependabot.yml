version: 2

# GitHub Actions ecosystem only — this repo has no runtime language dependencies.
updates:
  - package-ecosystem: github-actions
    directory: /
    # Bots enter the 4-tier model at the lowest tier (dev) and cascade
    # dev -> qa -> main, like external contributors. The trust-dial gate
    # (trust-dial-gate.yml) governs whether each PR auto-merges or holds.
    target-branch: dev
    schedule:
      interval: weekly
    # Group all Actions updates into a single PR to reduce noise.
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
