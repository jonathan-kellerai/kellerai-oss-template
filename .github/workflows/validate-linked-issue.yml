name: Validate linked issue

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read
  issues: read

# Verifies the issue referenced in the branch name is Open and carries the
# 'codeowner-approved' label. Only fires for external/ branches.
# Linear integration: set the LINEAR_API_KEY repository secret to enable
# Linear issue validation (see docs/branch-governance.md).
jobs:
  validate-linked-issue:
    name: Linked issue open + codeowner-approved
    if: startsWith(github.event.pull_request.head.ref, 'external/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Extract and verify linked issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;

            // Extract issue key from: external/<type>-<KEY>-<rest>-p<N>
            // KEY is Linear-style (ABC-123) or numeric GitHub issue (42).
            const m = branch.match(/^external\/[^-]+-([A-Z]+-\d+|\d+)-/);
            if (!m) {
              core.setFailed(`Could not extract issue key from branch '${branch}'.`);
              return;
            }
            const issueRef = m[1];

            // Linear path: if LINEAR_API_KEY is configured and key is Linear-style, defer.
            const linearKey = process.env.LINEAR_API_KEY;
            if (linearKey && /^[A-Z]+-\d+$/.test(issueRef)) {
              core.info(`Linear issue ${issueRef} detected. Configure the linear-issue-gate action for full Linear validation (see docs/branch-governance.md).`);
              return;
            }

            // GitHub Issues path: use numeric part of the issue ref.
            const numMatch = issueRef.match(/(\d+)$/);
            if (!numMatch) {
              core.setFailed(`Issue ref '${issueRef}' is not a GitHub issue number. Set the LINEAR_API_KEY secret for Linear validation.`);
              return;
            }
            const issueNumber = parseInt(numMatch[1], 10);

            let issue;
            try {
              const resp = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              issue = resp.data;
            } catch (e) {
              core.setFailed(`GitHub issue #${issueNumber} not found: ${e.message}`);
              return;
            }

            if (issue.state !== 'open') {
              core.setFailed(`Issue #${issueNumber} is ${issue.state}. PRs require an open issue.`);
              return;
            }

            const labels = issue.labels.map(l => l.name);
            if (!labels.includes('codeowner-approved')) {
              core.setFailed(
                `Issue #${issueNumber} is missing the 'codeowner-approved' label. ` +
                `A CODEOWNER must approve the issue before a contributor PR can be opened.`
              );
              return;
            }

            core.info(`Issue #${issueNumber} is open and codeowner-approved. ✓`);
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
