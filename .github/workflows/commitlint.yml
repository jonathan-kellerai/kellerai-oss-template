name: Commit lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  # Dev-sync PRs (head ref `main`, base ref a long-lived `dev` branch) propagate
  # commits that already passed validation when they landed on main via the
  # standard PR flow. Re-validating them on the sync PR re-checks any historical
  # non-conforming commit (e.g. early grandfathered or pre-policy commits),
  # which would otherwise block the sync. Skip this job when the PR is a dev
  # sync; everything else is validated normally.
  commitlint:
    name: Validate commit messages (Conventional Commits)
    if: github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # Requires commitlint.config.js at the repo root (config-conventional preset).
      # Hard fail — any non-conforming commit message blocks the PR.
      - name: Validate pull request commit messages
        run: |
          npx --yes \
            --package @commitlint/cli \
            --package @commitlint/config-conventional \
            commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose
