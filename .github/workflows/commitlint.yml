name: Commit lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  # Dev-sync PRs propagate commits that already passed validation when they
  # landed on main via the standard PR flow. Re-validating them on the sync PR
  # re-checks any historical non-conforming commit (e.g. early grandfathered or
  # pre-policy commits), which would otherwise block the sync. Two patterns reach
  # this workflow: (1) head ref `main` when histories are linear and the PR can
  # merge directly, and (2) a `sync/*` conflict-resolution branch when histories
  # have diverged and a direct head=main PR won't merge cleanly. Both replay
  # already-validated commits, so commitlint is skipped for both.
  commitlint:
    name: Validate commit messages (Conventional Commits)
    if: github.event.pull_request.head.ref != 'main' && !startsWith(github.event.pull_request.head.ref, 'sync/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # Requires commitlint.config.js at the repo root (config-conventional preset).
      # Hard fail — any non-conforming commit message blocks the PR.
      - name: Validate pull request commit messages
        run: |
          npx --yes \
            --package @commitlint/cli \
            --package @commitlint/config-conventional \
            commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose
