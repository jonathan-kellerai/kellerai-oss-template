# Lefthook git hooks. Install locally with: lefthook install
pre-commit:
  parallel: true
  commands:
    opa-check:
      run: opa check conformance/
    opa-test:
      run: opa test conformance/
    sanitization:
      run: bash scripts/check-sanitization.sh

commit-msg:
  commands:
    blast-radius-pulse:
      run: bash scripts/pulse.sh --mode live --commit-msg-file {1}
      skip:
        - merge
        - rebase
