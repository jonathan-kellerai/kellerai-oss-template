# markdownlint-cli2 configuration.
#
# Rules disabled so that existing wide tables, frozen docs, and issue / PR
# templates do not fail the lint gate.
config:
  MD013: false  # line length
  MD022: false  # blanks around headings
  MD025: false  # multiple top-level headings
  MD029: false  # ordered-list item prefix
  MD031: false  # blanks around fenced code
  MD032: false  # blanks around lists
  MD034: false  # bare URLs (intentional in attribution blocks)
  MD036: false  # emphasis used instead of a heading
  MD040: false  # fenced code without a language
  MD041: false  # first line not a top-level heading
  MD060: false  # table column style
ignores:
  - "node_modules/**"
  - ".claude-tmp/**"
