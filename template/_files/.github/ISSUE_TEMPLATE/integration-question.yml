name: Integration question
description: "Ask how to adopt or wire in the {{REPO_NAME}} artifact."
title: "[integration] "
labels: ["question", "integration"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for questions about applying `{{REPO_NAME}}` to a system.
        This is a {{ARTIFACT_TYPE}} artifact — there is no package to install.
  - type: textarea
    id: context
    attributes:
      label: Your context
      description: "What kind of system are you integrating, and which elements are you targeting?"
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: reading
    attributes:
      label: What have you already read?
      description: Optional — which artifact sections or supporting docs you have consulted.
    validations:
      required: false
