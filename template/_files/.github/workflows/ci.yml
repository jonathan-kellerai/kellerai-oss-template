name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: JSON well-formedness
        run: |
          status=0
          while IFS= read -r f; do
            if ! jq empty "$f" >/dev/null 2>&1; then
              echo "::error file=$f::invalid JSON"
              status=1
            fi
          done < <(find . -type f -name '*.json' \
            -not -path './.git/*' -not -path './node_modules/*')
          exit $status

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Sanitization gate
        run: bash scripts/check-sanitization.sh

  conformance:
    uses: jonathan-kellerai/kellerai-oss-template/.github/workflows/conformance.yml@<PENDING-SHA>
    with:
      artifact_type: "{{ARTIFACT_TYPE}}"

  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--no-progress --exclude {{OWNER}}/{{REPO_NAME}} ."
          fail: true
